name: Sweep
options:
  bundleIdPrefix: com.sweep
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Sweep:
    type: application
    platform: macOS
    sources:
      - path: Sweep
    settings:
      base:
        INFOPLIST_FILE: Sweep/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sweep/Sweep.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.sweep.app
        PRODUCT_NAME: Sweep
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
