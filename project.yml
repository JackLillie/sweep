name: Sweep
options:
  bundleIdPrefix: dev.jacklillie
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: "A64F9R7E55"
    CODE_SIGN_STYLE: Automatic

targets:
  Sweep:
    type: application
    platform: macOS
    sources:
      - path: Sweep
    settings:
      base:
        INFOPLIST_FILE: Sweep/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sweep/Sweep.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: dev.jacklillie.Sweep
        PRODUCT_NAME: Sweep
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
    postBuildScripts:
      - script: "${SRCROOT}/scripts/bundle-mole.sh"
        name: "Bundle Mole"
